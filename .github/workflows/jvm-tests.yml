name: OlliteRT Build & Test

on:
  push:
    paths:
      - 'Android/src/**'
      - '.github/workflows/jvm-tests.yml'
  pull_request:
    paths:
      - 'Android/src/**'
      - '.github/workflows/jvm-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Needed for git rev-list --count (auto versionCode)
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile stableDebug
        run: ./gradlew --no-daemon :app:compileStableDebugKotlin

      - name: Run JVM unit tests
        run: ./gradlew --no-daemon :app:testStableDebugUnitTest

      - name: Run lint
        run: ./gradlew --no-daemon :app:lintStableDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-${{ github.sha }}
          path: |
            Android/src/app/build/reports/tests/testStableDebugUnitTest/
            Android/src/app/build/test-results/testStableDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-report-${{ github.sha }}
          path: Android/src/app/build/reports/lint-results-stableDebug.html
          if-no-files-found: ignore
          retention-days: 14
