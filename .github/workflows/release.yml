name: Release OlliteRT APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0, v1.0.0-beta.1)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history needed for git rev-list --count (auto versionCode)
          fetch-depth: 0

      - name: Determine tag and channel
        id: tag
        run: |
          # Use the pushed tag, or the manual input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract version name: v1.2.3-beta.1 → 1.2.3-beta.1
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine channel and Gradle task from tag pattern
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=prod" >> "$GITHUB_OUTPUT"
            echo "task=assembleProdRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "flavor=prod" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "task=assembleBetaRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "task=assembleDevRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=dev" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized tag format: $TAG (expected vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-dev.N)"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/release.keystore
        working-directory: .

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon ${{ steps.tag.outputs.task }} \
            -PAPP_VERSION_NAME=${{ steps.tag.outputs.version }} \
            -PAPP_VERSION_CODE=${{ github.run_number }}

      - name: Rename APKs
        id: apks
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          FLAVOR="${{ steps.tag.outputs.flavor }}"
          OUT_DIR="app/build/outputs/apk/${FLAVOR}/release"
          RELEASE_DIR="release-apks"
          mkdir -p "$RELEASE_DIR"

          # ABI splits produce multiple APKs: app-<flavor>-arm64-v8a-release.apk, etc.
          # Rename to user-friendly filenames for the GitHub Release.
          for APK in "$OUT_DIR"/*.apk; do
            BASENAME=$(basename "$APK")
            if [[ "$BASENAME" == *"universal"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-universal.apk"
            elif [[ "$BASENAME" == *"arm64-v8a"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-arm64-v8a.apk"
            elif [[ "$BASENAME" == *"x86_64"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-x86_64.apk"
            else
              DEST="$RELEASE_DIR/OlliteRT-${TAG}.apk"
            fi
            cp "$APK" "$DEST"
            SIZE=$(stat -c%s "$DEST")
            echo "$(basename "$DEST"): $(numfmt --to=iec-i --suffix=B $SIZE)"
          done

          echo "dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: OlliteRT ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: Android/src/${{ steps.apks.outputs.dir }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
