name: Release OlliteRT APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0, v1.0.0-beta.1)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version_code: ${{ github.run_number }}
      tag: ${{ steps.tag.outputs.tag }}
    defaults:
      run:
        working-directory: Android/src

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history needed for git rev-list --count (auto versionCode)
          fetch-depth: 0

      - name: Determine tag and channel
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          # Use the pushed tag, or the manual input
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Extract version name: v1.2.3-beta.1 → 1.2.3-beta.1
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine channel and Gradle task from tag pattern
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "task=assembleStableRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "flavor=stable" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "task=assembleBetaRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "task=assembleDevRelease" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flavor=dev" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized tag format: $TAG (expected vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-dev.N)"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --licenses < /dev/null > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — configure it in repository Settings > Secrets"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
        working-directory: .

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_TASK: ${{ steps.tag.outputs.task }}
          APP_VERSION: ${{ steps.tag.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          ./gradlew --no-daemon "$GRADLE_TASK" \
            -PAPP_VERSION_NAME="$APP_VERSION" \
            -PAPP_VERSION_CODE="$VERSION_CODE"

      - name: Rename APKs
        id: apks
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          FLAVOR: ${{ steps.tag.outputs.flavor }}
        run: |
          OUT_DIR="app/build/outputs/apk/${FLAVOR}/release"
          RELEASE_DIR="release-apks"
          mkdir -p "$RELEASE_DIR"

          shopt -s nullglob
          for APK in "$OUT_DIR"/*.apk; do
            BASENAME=$(basename "$APK")
            if [[ "$BASENAME" == *"universal"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-universal.apk"
            elif [[ "$BASENAME" == *"arm64-v8a"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-arm64-v8a.apk"
            elif [[ "$BASENAME" == *"x86_64"* ]]; then
              DEST="$RELEASE_DIR/OlliteRT-${TAG}-x86_64.apk"
            else
              DEST="$RELEASE_DIR/OlliteRT-${TAG}.apk"
            fi
            cp "$APK" "$DEST"
            SIZE=$(stat -c%s "$DEST")
            echo "$(basename "$DEST"): $(numfmt --to=iec-i --suffix=B $SIZE)"
          done

          if [ -z "$(ls -A "$RELEASE_DIR" 2>/dev/null)" ]; then
            echo "::error::No APK files found in $OUT_DIR — build or signing may have failed"
            exit 1
          fi

          echo "dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: OlliteRT ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: Android/src/${{ steps.apks.outputs.dir }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fastlane-changelog:
    needs: release
    runs-on: ubuntu-latest
    # Only run for stable releases (not beta/dev — no store listing for those).
    # Uses needs.release.outputs.tag (not github.ref) because workflow_dispatch
    # sets github.ref to the branch name, not the tag entered by the user.
    if: ${{ !contains(needs.release.outputs.tag, '-beta.') && !contains(needs.release.outputs.tag, '-dev.') }}
    permissions:
      contents: write
    concurrency:
      group: fastlane-changelog
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TAG" ]; then
            echo "::error::Tag output is empty — release job may not have set outputs.tag"
            exit 1
          fi
          # Fetch release body via GitHub API — handles all special chars safely.
          # .body // empty: outputs nothing for null body (instead of literal "null").
          gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.body // empty' > "$RUNNER_TEMP/release_body.txt"
          BYTES=$(wc -c < "$RUNNER_TEMP/release_body.txt")
          echo "Retrieved release body ($BYTES bytes)"
          if [ "$BYTES" -lt 2 ]; then
            echo "::warning::Release body is empty — changelog will be skipped"
          fi

      - name: Generate fastlane changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/generate_fastlane_changelog.py \
            < "$RUNNER_TEMP/release_body.txt" \
            > "$RUNNER_TEMP/changelog.txt"

          if [ ! -s "$RUNNER_TEMP/changelog.txt" ]; then
            echo "::warning::No changelog generated (empty output) — skipping commit"
            echo "SKIP_COMMIT=true" >> "$GITHUB_ENV"
          else
            echo "--- Generated changelog ---"
            cat "$RUNNER_TEMP/changelog.txt"
            echo ""
            echo "--- Length: $(python3 -c "import sys; print(len(sys.stdin.read().strip()), 'chars')" < "$RUNNER_TEMP/changelog.txt") ---"
          fi

      - name: Commit changelog
        if: ${{ env.SKIP_COMMIT != 'true' }}
        env:
          VERSION_CODE: ${{ needs.release.outputs.version_code }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          CHANGELOG_DIR="Android/src/fastlane/metadata/android/en-US/changelogs"
          CHANGELOG_FILE="$CHANGELOG_DIR/${VERSION_CODE}.txt"

          mkdir -p "$CHANGELOG_DIR"
          cp "$RUNNER_TEMP/changelog.txt" "$CHANGELOG_FILE"

          git add "$CHANGELOG_FILE"

          # Only commit if there's actually a change
          if git diff --cached --quiet; then
            echo "No changes to commit (file already exists with same content)"
          else
            git commit -m "Add fastlane changelog for $TAG (versionCode $VERSION_CODE)"
            git pull --rebase origin main
            git push origin main
          fi
